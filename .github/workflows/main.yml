name: Build APK
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - uses: android-actions/setup-android@v3
      - name: Install SDK
        run: |
          yes | sdkmanager --licenses || true
          sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.4'
      - name: Setup project structure
        run: |
          mkdir -p app/src/main/java/com/munazzim/pro
          mkdir -p app/src/main/assets
          mkdir -p app/src/main/res/values
          [ -f MainActivity.java ] && mv MainActivity.java app/src/main/java/com/munazzim/pro/
          [ -f AndroidManifest.xml ] && mv AndroidManifest.xml app/src/main/
          [ -f strings.xml ] && mv strings.xml app/src/main/res/values/
          [ -f index.html ] && mv index.html app/src/main/assets/
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
      - name: Build APK
        run: gradle assembleDebug --no-daemon
      - uses: actions/upload-artifact@v4
        with:
          name: munazzim-pro-apk
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
